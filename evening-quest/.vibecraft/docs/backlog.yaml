phases:
  - id: mvp
    name: MVP
    description: Минимально жизнеспособный продукт
    order: 1
tasks:
  - id: task-001
    phase: mvp
    title: Визуальная заглушка главной страницы с картой
    description: >-
      Создать главную страницу приложения с картой и статическими
      данными-заглушками.

      Цель: дать пользователю первый визуальный результат как можно быстрее.

      Карта отображается в стилизованном «сказочном» виде, тёплая цветовая
      гамма. На карте показаны несколько тестовых точек (кафе, парк, памятник).
    priority: high
    acceptance_criteria:
      - Главная страница отображается без ошибок
      - Карта отображается с возможностью приближения/удаления
      - На карте видны тестовые точки-достопримечательности
    depends_on: []
    related_feature: Выбор квеста
    status: completed
    summary: "Главная страница заменена на карту с тёплой сказочной стилистикой.
      Использованы CartoDB Voyager (тёплые тона) и react-leaflet. На карте 5
      тестовых точек (2 кафе, 2 парка, 1 памятник) с кастомными CircleMarker и
      Popup. Управление зумом работает через колесо мыши и стандартные кнопки.
      Основные файлы: app/page.tsx, components/map-view.tsx,
      components/map-inner.tsx, lib/data.ts."
  - id: task-002
    phase: mvp
    title: Выбор цели квеста на карте
    description:
      Пользователь может выбрать одну из предложенных точек на карте или
      поставить произвольную метку. После выбора показывается расстояние до цели
      и примерное время в пути. Квесту присваивается случайное тематическое
      название (например, «Доставить кольцо в Одинокую Башню»).
    priority: high
    acceptance_criteria:
      - Пользователь может кликнуть на точку на карте и выбрать её как цель
      - Пользователь может поставить произвольную метку на карте
      - После выбора показывается расстояние до цели и примерное время в пути
      - Квест получает случайное фэнтези-название
    depends_on:
      - task-001
    related_feature: Выбор квеста
    status: completed
    summary:
      "Реализован выбор цели квеста на карте: клик по достопримечательности
      выбирает её как цель, клик по пустому месту ставит произвольную метку. Под
      картой отображается панель со случайным фэнтези-названием квеста,
      расстоянием до цели и примерным временем пешком (5 км/ч). Основные файлы:
      components/map-view.tsx, components/map-inner.tsx, lib/data.ts."
  - id: task-003
    phase: mvp
    title: Отслеживание прогресса в реальном времени
    description:
      Пока пользователь идёт к цели, на карте отображается его текущее
      местоположение, пройденный маршрут линией и оставшийся путь. Показывается
      прогресс-бар с процентом завершения, пройденное расстояние и оставшееся
      время.
    priority: high
    acceptance_criteria:
      - Текущее местоположение обновляется на карте в реальном времени
      - Пройденный маршрут отрисовывается линией на карте
      - Отображается прогресс-бар с процентом завершения
      - Показывается пройденное расстояние и оставшееся до цели
    depends_on:
      - task-002
    related_feature: Отслеживание прогресса
    status: completed
    summary: "Реализовано отслеживание прогресса в реальном времени: симуляция
      движения от старта к цели с обновлением каждую секунду. Текущее
      местоположение отображается синим маркером, пройденный маршрут — оранжевой
      линией, оставшийся путь — пунктирной линией. Прогресс-бар с процентом,
      пройденное расстояние и оставшееся расстояние/время показываются в
      карточке под картой. Основные файлы: components/map-view.tsx,
      components/map-inner.tsx, lib/data.ts."
  - id: task-004
    phase: mvp
    title: Завершение квеста с поздравлением
    description: "Когда пользователь достигает цели, автоматически показывается
      экран завершения: поздравление, название выполненного квеста, время в
      пути, пройденная дистанция. Квест сохраняется в историю."
    priority: high
    acceptance_criteria:
      - При достижении цели автоматически показывается экран завершения
      - На экране — название квеста, дистанция, время, тематическое поздравление
      - Квест сохраняется в историю
    depends_on:
      - task-003
    related_feature: Завершение квеста
    status: completed
    summary: "Реализован экран завершения квеста: при достижении 100% прогресса
      через 600 мс показывается модальное окно с поздравлением, названием
      квеста, дистанцией и временем в пути. Квест автоматически сохраняется в
      историю через POST /api/quest-history (DynamoDB или fallback). Основные
      файлы: components/quest-completion.tsx (экран завершения),
      components/map-view.tsx (логика авто-показа и сохранения),
      app/api/quest-history/route.ts (API), lib/schema.ts (таблица
      quest-history), lib/models.ts (интерфейс QuestHistory)."
  - id: task-005
    phase: mvp
    title: История квестов
    description:
      Список всех завершённых квестов с датой, названием, дистанцией и
      временем. Можно открыть квест и посмотреть его маршрут на карте.
    priority: medium
    acceptance_criteria:
      - Отображается список всех завершённых квестов
      - Каждый элемент показывает дату, название, дистанцию, время
      - Можно открыть квест и посмотреть его маршрут на карте
    depends_on:
      - task-004
    related_feature: История квестов
    status: completed
    summary:
      "Реализована страница /history со списком завершённых квестов (дата,
      название, дистанция, время). При клике на квест открывается диалог с
      картой, на которой отображены маршрут, точка старта и точка цели. Основные
      файлы: app/history/page.tsx, components/history-view.tsx,
      components/history-map-detail.tsx. Добавлена навигационная ссылка в
      app/layout.tsx."
  - id: task-006
    phase: mvp
    title: Достижения и бейджи
    description:
      Система бейджей за первые прогулки, серии дней подряд, рекордную
      дистанцию. Бейджи выдаются автоматически при выполнении условий. Список
      всех бейджей отображается в профиле с названием, иконкой и описанием.
    priority: medium
    acceptance_criteria:
      - Бейджи выдаются автоматически при выполнении условий
      - Список всех бейджей отображается в профиле
      - У каждого бейджа есть название, иконка и описание условия получения
    depends_on:
      - task-004
    related_feature: Достижения
    status: completed
    summary: "Реализована система из 9 бейджей: «Первый шаг», «Исследователь»,
      «Следопыт», «Марафонец», «Путешественник», «Скороход», «Три дня подряд»,
      «Неделя приключений», «Ночная сова». Бейджи вычисляются из истории квестов
      через GET /api/badges и отображаются на странице /profile с названием,
      иконкой и описанием. При завершении квеста бейджи автоматически
      проверяются, и за новые показывается toast-уведомление. Основные файлы:
      lib/badges.ts, app/api/badges/route.ts, components/badge-list.tsx,
      app/profile/page.tsx."
  - id: task-007
    phase: mvp
    title: Исправить отображение панели после выбора произвольной метки
    description: Сейчас после выбора произвольной метки на карте ничего не
      происходит — панель с названием квеста и кнопкой «Начать путь» не
      показывается, потому что название квеста не генерируется при выборе цели.
      Нужно, чтобы при любом выборе цели (клик по точке или установка метки)
      сразу появлялась информационная панель с названием квеста, дистанцией и
      временем, а также кнопкой «Начать путь».
    priority: high
    acceptance_criteria:
      - При клике на пустое место на карте сразу появляется панель с названием
        квеста, дистанцией и временем
      - При клике на достопримечательность сразу появляется панель с названием
        квеста, дистанцией и временем
      - Кнопка «Начать путь» работает из этой панели
    depends_on: []
    related_feature: Выбор квеста
    status: completed
    summary: "Исправлено: теперь при любом выборе цели (клик по
      достопримечательности или установка произвольной метки на пустом месте)
      сразу генерируется название квеста и показывается информационная панель с
      названием, дистанцией, временем и кнопкой «Начать путь». Основное
      изменение: в handleSelectLandmark и handlePlaceMarker
      (components/map-view.tsx) вместо очистки questName теперь сразу вызывается
      generateQuestName()."
  - id: task-008
    phase: mvp
    title: Использовать реальное местоположение пользователя для расчёта дистанции
    description:
      Сейчас стартовая точка для расчёта расстояния и симуляции маршрута
      жёстко зашита как центр карты (mapCenter). Нужно запрашивать реальные
      координаты пользователя через Geolocation API и использовать их как
      стартовую точку. Если пользователь не дал разрешение — использовать
      текущий центр карты как fallback.
    priority: high
    acceptance_criteria:
      - При открытии приложения запрашивается разрешение на геолокацию
      - Если пользователь разрешил — карта центрируется на его реальном
        местоположении
      - Расстояние до цели считается от реального местоположения пользователя, а
        не от фиксированной точки
      - Если геолокация недоступна — используется текущий центр карты как
        запасной вариант
    depends_on: []
    related_feature: Выбор квеста
    status: completed
    summary:
      "Реализован запрос реального местоположения через Geolocation API. При
      открытии приложения запрашивается разрешение на геолокацию; если
      пользователь разрешил — координаты используются как стартовая точка для
      расчёта расстояния до цели, симуляции маршрута и центрирования карты. Если
      геолокация недоступна или отклонена — используется mapCenter как fallback.
      Основные файлы: hooks/use-geolocation.ts (новый хук),
      components/map-view.tsx (использование startPosition вместо mapCenter),
      components/map-inner.tsx (динамическое центрирование через
      MapCenterUpdater)."
  - id: task-009
    phase: mvp
    title: Добавить кнопку определения местоположения на карту
    description: Сейчас геолокация запрашивается автоматически при загрузке
      страницы, но браузер может блокировать запрос для незащищённого
      соединения. Нужно добавить кнопку «Определить моё местоположение» на
      карту, чтобы пользователь мог явно запустить определение геолокации. Также
      нужно показывать маркер текущего местоположения на карте даже до начала
      квеста.
    priority: high
    acceptance_criteria:
      - На карте отображается кнопка «Определить моё местоположение»
      - При нажатии на кнопку запрашивается геолокация и карта центрируется на
        пользователе
      - Если геолокация уже получена — кнопка показывает, что местоположение
        определено
      - Пользователь видит на карте маркер своего местоположения (даже до старта
        квеста)
    depends_on: []
    related_feature: Выбор квеста
    status: completed
    summary: "Добавлена кнопка «Определить моё местоположение» на карту
      (components/map-view.tsx) — при нажатии явно запрашивает геолокацию через
      Geolocation API. Хук use-geolocation.ts переписан: убран авто-запрос при
      монтировании, добавлена ручная функция locate(). Кнопка отображает три
      состояния: «Определить» (с иконкой Navigation), спиннер при загрузке,
      «Местоположение определено» (с иконкой CheckCircle2). Маркер пользователя
      (синий CircleMarker) теперь показывается на карте всегда, когда геолокация
      получена — даже до старта квеста (components/map-inner.tsx, пропс
      geoCoords)."
  - id: task-010
    phase: mvp
    title: Обработка ошибки геолокации и ручной ввод координат
    description:
      Сейчас если геолокация недоступна (HTTP вместо HTTPS, пользователь
      отклонил запрос, браузер не поддерживает) — ничего не происходит, кнопка
      просто не работает. Нужно показывать сообщение об ошибке и дать
      возможность ввести координаты вручную через небольшое поле ввода.
    priority: high
    acceptance_criteria:
      - Если геолокация недоступна или отклонена — показывается понятное
        сообщение с объяснением
      - Пользователь может ввести свои координаты вручную (широта/долгота)
      - После ввода координат карта центрируется на них и дистанция считается от
        них
      - Кнопка «Определить» показывает ошибку, если браузер не поддерживает
        геолокацию
    depends_on: []
    related_feature: Выбор квеста
    status: completed
    summary:
      "Добавлена обработка ошибок геолокации: пользовательские сообщения на
      русском языке для кодов ошибок 1-3 и неподдерживаемого API. Кнопка
      «Определить» переходит в красное состояние с иконкой AlertCircle при
      ошибке. Добавлен ручной ввод координат (широта/долгота) — кнопка «Ввести
      координаты вручную» под картой открывает поля ввода с валидацией. После
      применения координат карта центрируется на них, дистанция считается от
      введённой точки, на карте отображается маркер. Основные файлы:
      hooks/use-geolocation.ts, components/map-view.tsx."
  - id: task-011
    phase: mvp
    title: Заменить симуляцию на реальное GPS-отслеживание
    description:
      "Сейчас при нажатии «Начать путь» запускается симуляция движения —
      маркер сам анимированно движется к цели. Нужно заменить это на реальное
      GPS-отслеживание: при старте квеста приложение начинает слушать
      Geolocation API (watchPosition) и обновлять позицию пользователя по
      реальным данным. Прогресс считается от реально пройденного расстояния. При
      приближении к цели на 50 м квест завершается автоматически. Если
      пользователь нажимает «Остановить» — квест завершается досрочно с
      сохранением пройденного пути."
    priority: high
    acceptance_criteria:
      - При нажатии «Начать путь» запускается реальное GPS-отслеживание, а не
        симуляция
      - Текущее местоположение обновляется на карте по данным GPS каждые
        несколько секунд
      - Пройденный маршрут отрисовывается линией на карте
      - Прогресс-бар показывает процент пройденного расстояния до цели
      - Показывается пройденное расстояние и оставшееся до цели
      - Когда пользователь оказывается в радиусе 50 м от цели — квест
        завершается автоматически
      - Кнопка «Остановить» завершает квест досрочно и сохраняет пройденный путь
    depends_on: []
    related_feature: Отслеживание прогресса по GPS
    status: completed
    summary: "Симуляция движения заменена на реальное GPS-отслеживание через
      navigator.geolocation.watchPosition. При старте квеста вызывается
      startWatching(); каждый GPS-тик обновляет позицию на карте, накапливает
      пройденное расстояние (Haversine) и добавляет точку к travelledPath. При
      приближении к цели на 50 м квест завершается автоматически. Кнопка
      «Остановить» (Square) завершает квест досрочно и сохраняет пройденный путь
      через POST /api/quest-history. Время пути считается от Date.now() при
      старте. Основные файлы: components/map-view.tsx (useReducer для состояния
      трекинга), hooks/use-geolocation.ts (startWatching/stopWatching)."
